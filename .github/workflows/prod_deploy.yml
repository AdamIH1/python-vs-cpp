name: PyPI Prod Deployment
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  enforce-main-only:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not on main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ This workflow can ONLY run on the main branch."
          echo "Current branch: ${{ github.ref }}"
          exit 1
      - name: Continue if main
        run: echo "✔ Running workflow on main branch."

  ci:
    needs: [enforce-main-only]
    uses: ./.github/workflows/_reusable_unit_test_linter.yml

  deploy_flag_check:
    needs: [ci]
    uses: ./.github/workflows/_reusable_deploy_check_flag.yml

  check_test_pypi:
    name: Check Test PyPI Version
    runs-on: ubuntu-latest
    needs: [deploy_flag_check]
    if: ${{ needs.deploy_flag_check.outputs.deploy_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install version checker dependencies
        run: pip install --upgrade pip packaging
      - name: Run version check
        run: python scripts/check_pypi_version.py --test --stage deployed

  check_prod_pypi:
    name: Check Prod PyPI Version
    runs-on: ubuntu-latest
    needs: [deploy_flag_check]
    if: ${{ needs.deploy_flag_check.outputs.deploy_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install version checker dependencies
        run: pip install --upgrade pip packaging
      - name: Run version check
        run: python scripts/check_pypi_version.py --prod --stage deploying

  manual_approval:
    name: Manual Approval Before Prod Deploy
    runs-on: ubuntu-latest
    needs: [check_test_pypi, check_prod_pypi]
    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          approvers: AdamIH1
          secret: ${{ github.TOKEN }}
          minimum-approvals: 1
          issue-title: "Approve Deployment to Prod PyPI"
          issue-body: "Approve deployment to Prod PyPI from main."

  build:
    needs: [manual_approval]
    uses: ./.github/workflows/_reusable_build_wheels.yml

  publish_prod_pypi:
    name: Publish to Prod PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi_prod
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/
      - name: Publish to Prod PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
