name: Branch Development
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  issues: write
 
jobs:
  enforce-not-main-only:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if on main
        if: github.ref == 'refs/heads/main'
        run: |
          echo "❌ This workflow CANNOT run on the main branch."
          echo "Current branch: ${{ github.ref }}"
          exit 1
      - name: Continue if NOT main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "✔ Branch is NOT main. Continuing..."
          echo "Current branch: ${{ github.ref }}"
 
  ci:
    needs: [enforce-not-main-only]
    uses: ./.github/workflows/_reusable_unit_test_linter.yml
 
  deploy_flag_check:
    needs: [ci]
    uses: ./.github/workflows/_reusable_deploy_check_flag.yml
 
  check_test_pypi:
    name: Check TestPyPI Version
    runs-on: ubuntu-latest
    needs: [deploy_flag_check]
    if: ${{ needs.deploy_flag_check.outputs.deploy_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install version checker dependencies
        run: pip install --upgrade pip packaging
      - name: Run version check
        run: python scripts/check_pypi_version.py --test --stage deploying
 
  manual_approval:
    name: Manual Approval Before Deploy
    runs-on: ubuntu-latest
    needs: [check_test_pypi]
    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          approvers: AdamIH1
          secret: ${{ github.TOKEN }}
          minimum-approvals: 1
          issue-title: "Approve Deployment to TestPyPI"
          issue-body: "Approve deployment to TestPyPI for ${{ github.ref_name }}."
 
  build:
    needs: [manual_approval]
    uses: ./.github/workflows/_reusable_build_wheels.yml
 
  publish_test_pypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi_test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
