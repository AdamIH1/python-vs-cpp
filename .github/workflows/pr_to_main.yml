name: PR To Main From Branch
on:
  pull_request:
    branches:
      - main
 
jobs:
  ci:
    uses: ./.github/workflows/_reusable_unit_test_linter.yml
 
  deploy_flag_check:
    needs: [ci]
    uses: ./.github/workflows/_reusable_deploy_check_flag.yml
 
  check_test_pypi:
    name: Check Test PyPI Version
    runs-on: ubuntu-latest
    needs: [deploy_flag_check]
    if: ${{ needs.deploy_flag_check.outputs.deploy_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install version checker dependencies
        run: pip install --upgrade pip packaging
      - name: Run version check
        run: python scripts/check_pypi_version.py --test --stage deployed
 
  check_prod_pypi:
    name: Check Prod PyPI Version
    runs-on: ubuntu-latest
    needs: [deploy_flag_check]
    if: ${{ needs.deploy_flag_check.outputs.deploy_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install version checker dependencies
        run: pip install --upgrade pip packaging
      - name: Run version check
        run: python scripts/check_pypi_version.py --prod --stage deploying
